<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Identity — BuildSmart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-0: #050505;
      --bg-1: #080808;
      --bg-2: #0f0f0f;
      --border: rgba(255,255,255,0.06);
      --border-bright: rgba(255,255,255,0.12);
      --accent: #2979FF;
      --accent-dim: rgba(41,121,255,0.12);
      --accent-glow: rgba(41,121,255,0.35);
      --accent-subtle: rgba(41,121,255,0.06);
      --text-primary: #f0f0f0;
      --text-secondary: #888;
      --text-tertiary: #444;
      --radius: 14px;
    }

    body {
      background: var(--bg-0);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center; justify-content: center;
      padding: 60px 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      width: 800px; height: 800px;
      background: radial-gradient(circle, var(--accent-glow), transparent 70%);
      top: -10%; left: -10%;
      opacity: 0.15;
      pointer-events: none;
    }

    .register-wrapper { width: 100%; max-width: 440px; position: relative; z-index: 10; }

    .logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 40px; justify-content: center;
      text-decoration: none;
    }
    .logo-mark {
      width: 32px; height: 32px; background: var(--accent);
      border-radius: 8px; box-shadow: 0 0 20px var(--accent-glow);
      display: grid; place-items: center;
    }
    .logo-mark svg { width: 16px; height: 16px; fill: none; stroke: #000; stroke-width: 2.5; stroke-linecap: round; }
    .logo-text { font-size: 18px; font-weight: 500; letter-spacing: -0.4px; color: #fff; }
    .logo-text span { color: var(--accent); }

    .card {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: var(--radius); padding: 40px;
      box-shadow: 0 30px 90px rgba(0,0,0,0.5);
    }

    .header-group { margin-bottom: 32px; }
    .title { font-size: 24px; font-weight: 500; letter-spacing: -0.8px; margin-bottom: 8px; color: #fff; }
    .subtitle { font-size: 14px; color: var(--text-secondary); }

    /* Role Selection Grid */
    .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .role-option { display: none; }
    .role-label {
      display: block; padding: 12px; border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 12px; font-weight: 500; color: var(--text-secondary);
      cursor: pointer; transition: all 0.2s; text-align: center;
      background: var(--bg-2);
    }
    .role-label:hover { border-color: var(--border-bright); color: #fff; }
    .role-option:checked + .role-label {
      border-color: var(--accent); background: var(--accent-subtle); color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .form-group { margin-bottom: 24px; }
    .form-label {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: 1.2px; text-transform: uppercase;
      color: var(--text-tertiary); margin-bottom: 8px;
    }
    .form-input {
      width: 100%; background: var(--bg-2);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 16px; color: #fff;
      font-family: inherit; font-size: 14px;
      transition: all 0.2s;
    }
    .form-input::placeholder { color: #444; }
    .form-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-subtle); background: var(--bg-1); }

    .btn-submit {
      width: 100%; padding: 14px;
      background: var(--accent); border: none; border-radius: 10px;
      color: #000; font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; margin-top: 10px;
      box-shadow: 0 0 20px var(--accent-glow); transition: all 0.3s;
    }
    .btn-submit:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 0 28px var(--accent-glow); }

    .footer { text-align: center; margin-top: 28px; font-size: 13px; color: var(--text-secondary); }
    .footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .footer a:hover { text-decoration: underline; text-underline-offset: 4px; }

    .flash-list { margin-bottom: 24px; }
    .flash { padding: 12px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; animation: slideUp 0.3s ease; }
    .flash-error { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }

    @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body>

<div class="register-wrapper">
  <div class="logo">
    <div class="logo-mark"><svg viewBox="0 0 14 14"><path d="M2 12 L7 2 L12 12 M4 8.5 H10"/></svg></div>
    <span class="logo-text">Build<span>Smart</span></span>
  </div>

  <div class="card">
    <header class="header-group">
      <h2 class="title">Create Identity</h2>
      <p class="subtitle">Join the industry standard workspace</p>
    </header>

    <div class="flash-list">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="username" class="form-input" required placeholder="Jane Doe">
      </div>
      <div class="form-group">
        <label class="form-label">Professional Email</label>
        <input type="email" name="email" class="form-input" required placeholder="jane@buildsmart.com">
      </div>

      <div class="form-group">
        <label class="form-label">Role</label>
        <select name="role" class="form-input">
          <option value="Owner" selected>Owner — I own a plot or building</option>
          <option value="Architect">Architect</option>
          <option value="Engineer">Engineer</option>
          <option value="Contractor">Contractor</option>
          <option value="Authority">Authority</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Security Password</label>
        <input type="password" name="password" class="form-input" required placeholder="Min. 8 characters">
      </div>

      <button type="submit" class="btn-submit">Initialize Identity</button>
    </form>

    <footer class="footer">
      Existing account? <a href="{{ url_for('auth.login') }}">Sign In</a>
    </footer>
  </div>
</div>

</body>
</html>
